apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodejs-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nodejs-app
  template:
    metadata:
      labels:
        app: nodejs-app
    spec:
      containers:
      - name: nodejs-app
        image: 366110669587.dkr.ecr.us-east-1.amazonaws.com/nodejs-app-repo:latest
        ports:
        - containerPort: 3000